services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL
      - SECRET_KEY
      - OPENAI_API_KEY
      - GOOGLE_API_KEY
      - FRONTEND_URL
      - RESEND_API_KEY
      - EMAIL_FROM
      - EMAIL_USER
      - EMAIL_PASS
    volumes:
      - ./backend:/app
